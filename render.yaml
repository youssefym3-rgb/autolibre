# Configuración de despliegue de AutoLibre en Render (plan gratuito)
services:
  - type: web
    name: autolibre
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: AUTOLIBRE_SECRET
        generateValue: true
